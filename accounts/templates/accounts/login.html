<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login Page</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Email">
        <br><br>

        <input type="password" name="password" placeholder="Password">
        <br><br>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="/accounts/register/">Go to Register</a>

</body>
</html>
